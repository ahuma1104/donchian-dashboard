<script type="text/babel">
const {useState,useMemo,useEffect} = React;

// ⬇️⬇️ PEGÁ ACÁ EL LINK CSV PUBLICADO DE TU PLANILLA (ver pasos en el chat)
// Si lo dejás vacío (''), el dashboard funciona en modo manual (pegar datos).
const DATA_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTXUdfaLcjepKqnvI3jEXjrr2vRdOmf8MLgGoFh4Sro-GBj7RAAZn-2l1ajYrz7zT8X7U4hCDEvnW5y/pubhtml';

// ---------- DATOS DE EJEMPLO (reemplazar pegando los tuyos) ----------
// Formato del fetcher: Ticker,Date,High,Low,Close  — semanal
const SAMPLE = `Ticker,Date,High,Low,Close

DEMO2,2026-06-08,92,84,91`;

function parseData(raw){
  const lines = raw.trim().split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if(!lines.length) return {series:[], err:"No hay datos.", decimalMode:null};
  // detectar delimitador
  let delim = ",";
  if(lines[0].includes("\t")) delim="\t";
  else if(lines[0].includes(";")) delim=";";

  // header?
  const first = lines[0].split(delim).map(x=>x.toLowerCase().trim());
  const hasHeader = first.some(x=>/date|fecha|open|high|low|close|alto|bajo|cierre|apertura|max|min|ticker|simbolo|símbolo|symbol|papel/.test(x));
  let idx = {ticker:-1,date:0,high:2,low:3,close:4,updated:-1};
  let start = 0;
  if(hasHeader){
    start=1;
    const find=(pats)=>first.findIndex(c=>pats.some(p=>c.includes(p)));
    const tk=find(["ticker","simbolo","símbolo","symbol","papel"]); if(tk>=0) idx.ticker=tk;
    const d=find(["date","fecha"]); if(d>=0) idx.date=d;
    const h=find(["high","alto","max"]); if(h>=0) idx.high=h;
    const l=find(["low","bajo","min"]); if(l>=0) idx.low=l;
    const c=find(["close","cierre","adj"]); if(c>=0) idx.close=c;
    const u=find(["updated","actualiz","hora"]); if(u>=0) idx.updated=u;
  }

  // --- AUTODETECCIÓN del separador decimal ---
  let sawComma=false, sawDot=false, commaAfterDot=0, dotAfterComma=0;
  for(let i=start;i<lines.length;i++){
    const p=lines[i].split(delim);
    [p[idx.high],p[idx.low],p[idx.close]].forEach(tok=>{
      if(tok==null) return;
      const t=String(tok);
      const lc=t.lastIndexOf(","), ld=t.lastIndexOf(".");
      if(lc>-1) sawComma=true;
      if(ld>-1) sawDot=true;
      if(lc>-1 && ld>-1){ if(lc>ld) commaAfterDot++; else dotAfterComma++; }
    });
  }
  let decimalMode;
  if(sawComma && sawDot){ decimalMode = (commaAfterDot>=dotAfterComma) ? 'coma' : 'punto'; }
  else if(sawComma && !sawDot){ decimalMode = 'coma'; }
  else { decimalMode = 'punto'; }

  const num = (s)=>{
    if(s==null) return NaN;
    let t=String(s).trim();
    if(decimalMode==='coma') t=t.replace(/\./g,"").replace(/,/g,".");
    else t=t.replace(/,/g,"");
    return parseFloat(t);
  };

  // agrupar por ticker (o serie única si no hay columna)
  const map = new Map();
  let updatedAt = null;
  for(let i=start;i<lines.length;i++){
    const p=lines[i].split(delim);
    const close=num(p[idx.close]);
    let high=num(p[idx.high]), low=num(p[idx.low]);
    if(!isFinite(high)) high=close;
    if(!isFinite(low)) low=close;
    if(!isFinite(close)) continue;
    if(!updatedAt && idx.updated>=0 && p[idx.updated]) updatedAt=String(p[idx.updated]).trim();
    const name = idx.ticker>=0 ? String(p[idx.ticker]||"").trim().toUpperCase() : "SERIE";
    if(!name) continue;
    if(!map.has(name)) map.set(name,[]);
    map.get(name).push({date:(p[idx.date]||("#"+i)).trim(),high,low,close});
  }

  const series=[];
  map.forEach((rows,name)=>{
    rows.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0); // cronológico
    if(rows.length>=2) series.push({name,rows});
  });

  if(!series.length) return {series:[],err:"Necesito al menos 2 filas con cierre válido por ticker.",decimalMode,updatedAt};
  return {series,err:null,decimalMode,updatedAt};
}

function donchian(rows, period, excludeCurrent){
  const out=rows.map(r=>({...r,upper:null,mid:null,lower:null}));
  for(let i=0;i<rows.length;i++){
    const end = excludeCurrent ? i-1 : i;
    const startIdx = end-period+1;
    if(startIdx<0) continue;
    let hi=-Infinity,lo=Infinity;
    for(let j=startIdx;j<=end;j++){ if(rows[j].high>hi)hi=rows[j].high; if(rows[j].low<lo)lo=rows[j].low; }
    out[i].upper=hi; out[i].lower=lo; out[i].mid=(hi+lo)/2;
  }
  return out;
}

function Chart({data}){
  const W=720,H=360,pad={l:8,r:62,t:14,b:22};
  const vis=data.filter(d=>d.upper!=null);
  if(vis.length<2) return <div style={{color:'var(--muted)',padding:'30px 0'}}>Pocos datos para graficar con este período. Bajá el período o pegá más velas.</div>;
  const xs=data; // mostramos todo, bandas arrancan donde hay cálculo
  const n=xs.length;
  let min=Infinity,max=-Infinity;
  xs.forEach(d=>{[d.high,d.low,d.upper,d.lower,d.close].forEach(v=>{if(v!=null&&isFinite(v)){if(v<min)min=v;if(v>max)max=v;}});});
  const padV=(max-min)*0.06; min-=padV; max+=padV;
  const X=i=>pad.l+(i/(n-1))*(W-pad.l-pad.r);
  const Y=v=>pad.t+(1-(v-min)/(max-min))*(H-pad.t-pad.b);
  const path=(key)=>{let s="",started=false;xs.forEach((d,i)=>{const v=d[key];if(v==null||!isFinite(v)){started=false;return;}s+=(started?"L":"M")+X(i).toFixed(1)+" "+Y(v).toFixed(1)+" ";started=true;});return s;};
  // área de banda
  let area="";{let up=[],lo=[];xs.forEach((d,i)=>{if(d.upper!=null){up.push([X(i),Y(d.upper)]);lo.push([X(i),Y(d.lower)]);}});if(up.length){area="M"+up.map(p=>p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" L")+" L"+lo.reverse().map(p=>p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" L")+" Z";}}
  const last=xs[n-1];
  const gridY=[0,.25,.5,.75,1].map(t=>min+t*(max-min));
  return (
   <div>
    <svg viewBox={`0 0 ${W} ${H}`}>
      {gridY.map((g,i)=>(<g key={i}>
        <line x1={pad.l} x2={W-pad.r} y1={Y(g)} y2={Y(g)} stroke="var(--line)" strokeWidth="1"/>
        <text x={W-pad.r+6} y={Y(g)+3} fill="var(--dim)" fontSize="10">{g.toFixed(0)}</text>
      </g>))}
      {area && <path d={area} fill="var(--band)" stroke="none"/>}
      <path d={path('upper')} fill="none" stroke="var(--up)" strokeWidth="1.6"/>
      <path d={path('lower')} fill="none" stroke="var(--down)" strokeWidth="1.6"/>
      <path d={path('mid')} fill="none" stroke="var(--mid)" strokeWidth="1.4" strokeDasharray="5 4"/>
      <path d={path('close')} fill="none" stroke="var(--price)" strokeWidth="2"/>
      {last.upper!=null && <g>
        <line x1={pad.l} x2={W-pad.r} y1={Y(last.upper)} y2={Y(last.upper)} stroke="var(--up)" strokeWidth=".5" strokeDasharray="2 4" opacity=".5"/>
        <line x1={pad.l} x2={W-pad.r} y1={Y(last.mid)} y2={Y(last.mid)} stroke="var(--mid)" strokeWidth=".5" strokeDasharray="2 4" opacity=".5"/>
      </g>}
      <circle cx={X(n-1)} cy={Y(last.close)} r="4" fill="var(--price)" stroke="var(--bg)" strokeWidth="2"/>
    </svg>
    <div className="legend">
      <span><i className="swatch" style={{background:'var(--price)'}}></i>Cierre</span>
      <span><i className="swatch" style={{background:'var(--up)'}}></i>Banda sup (máx {`{N}`})</span>
      <span><i className="swatch" style={{background:'var(--mid)'}}></i>Línea media</span>
      <span><i className="swatch" style={{background:'var(--down)'}}></i>Banda inf (mín {`{N}`})</span>
    </div>
   </div>
  );
}

function analyze(rows, period, excludeCurrent){
  const data = donchian(rows, Math.max(2,period|0), excludeCurrent);
  const last = data.length?data[data.length-1]:null;
  const has = last && last.upper!=null;
  const range = has ? last.upper-last.lower : 0;
  const pos = has && range>0 ? ((last.close-last.lower)/range)*100 : 0;
  const distMidPct = has ? ((last.mid-last.close)/last.close)*100 : 0;
  const distUpPct = has ? ((last.upper-last.close)/last.close)*100 : 0;
  const distLoPct = has ? ((last.close-last.lower)/last.close)*100 : 0;
  let estado={cls:'neu',txt:'En el canal'};
  if(has){
    if(last.close>=last.upper) estado={cls:'alc',txt:'Ruptura alcista'};
    else if(last.close<=last.lower) estado={cls:'baj',txt:'Ruptura bajista'};
    else if(last.close>last.mid) estado={cls:'alc',txt:'Mitad superior'};
    else estado={cls:'baj',txt:'Mitad inferior'};
  }
  return {data,last,has,range,pos,distMidPct,distUpPct,distLoPct,estado};
}

function App(){
  const [raw,setRaw]=useState(SAMPLE);
  const [period,setPeriod]=useState(20);
  const [excludeCurrent,setExcludeCurrent]=useState(false);
  const [showSum,setShowSum]=useState(false);
  const [sel,setSel]=useState(null);
  const [auto,setAuto]=useState({on:!!DATA_URL, loading:!!DATA_URL, err:null, fetchedAt:null});
  const isSample = raw.trim()===SAMPLE.trim();

  const cargar = ()=>{
    if(!DATA_URL) return;
    setAuto(a=>({...a,loading:true,err:null}));
    fetch(DATA_URL + (DATA_URL.includes('?')?'&':'?') + '_=' + Date.now())
      .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
      .then(txt=>{ setRaw(txt); setShowSum(false); setAuto(a=>({...a,loading:false,err:null,fetchedAt:new Date()})); })
      .catch(e=>setAuto(a=>({...a,loading:false,err:e.message})));
  };
  useEffect(()=>{ cargar(); },[]);

  const {series,err,decimalMode,updatedAt}=useMemo(()=>parseData(raw),[raw]);

  // análisis de TODAS las series (para la vista de portfolio)
  const analyzed=useMemo(()=> (err?[]:series).map(s=>({name:s.name,rows:s.rows,a:analyze(s.rows,period,excludeCurrent)})),[series,err,period,excludeCurrent]);

  // ticker seleccionado (default: el primero; si el elegido ya no existe, vuelve al primero)
  const names = analyzed.map(s=>s.name);
  const current = (sel && names.includes(sel)) ? sel : (names[0]||null);
  const cur = analyzed.find(s=>s.name===current) || null;
  const data = cur ? cur.a.data : [];
  const A = cur ? cur.a : null;
  const has = A && A.has;
  const {last,range,pos,distMidPct,distUpPct,distLoPct,estado} = A || {};

  const fmt=(v,d=2)=>v==null||!isFinite(v)?'—':v.toLocaleString('es-AR',{minimumFractionDigits:d,maximumFractionDigits:d});

  const summary = has ? `📊 *DONCHIAN ${period} · ${current} · semanal*
═══════════════════
Cierre: *${fmt(last.close)}*
🟢 Banda sup: ${fmt(last.upper)}  (${distUpPct>=0?'+':''}${fmt(distUpPct)}%)
🟡 Media: ${fmt(last.mid)}  (${distMidPct>=0?'+':''}${fmt(distMidPct)}%)
🔴 Banda inf: ${fmt(last.lower)}  (${distLoPct>=0?'+':''}${fmt(distLoPct)}% arriba)
Posición en canal: ${fmt(pos,0)}%  ·  Ancho: ${fmt(range)}
Estado: ${estado.txt}
═══════════════════
⚠️ Análisis técnico, NO recomendación.` : '';

  return (
   <div className="wrap">
     <div className="eyebrow">Relative Rotation Graph · familia de dashboards</div>
     <h1>Canales de <em>Donchian</em></h1>
     <div className="sub">Máx/mín de N velas · línea media como soporte/resistencia dinámica · pensado para gráfico semanal</div>

     <div className="statusbar">
       {auto.on ? (
         auto.loading ? <span className="st load">↻ Cargando datos...</span> :
         auto.err ? <span className="st bad">⚠ No se pudo actualizar ({auto.err}). Mostrando lo último disponible o el ejemplo.</span> :
         <span className="st ok">● Datos en vivo{updatedAt?` · última actualización: ${updatedAt} hs (ARG)`:''}</span>
       ) : <span className="st man">● Modo manual — pegá tus datos abajo</span>}
       {auto.on && <button className="btn mini" onClick={cargar} disabled={auto.loading}>Actualizar ahora</button>}
     </div>

     <details className="intro" open>
       <summary>Qué es esto y cómo se usa <span className="chev">▾</span></summary>
       <div className="body">
         <p>El <b>Canal de Donchian</b> dibuja tres líneas a partir del precio: el <b>máximo</b> y el <b>mínimo</b> de las últimas N velas, y el promedio entre ambos. Sirve para ver el rango en el que se mueve un activo y para usar esas líneas como niveles de soporte y resistencia.</p>
         <div className="bands">
           <div className="bandrow"><span className="dotc" style={{background:'var(--up)'}}></span><span><b style={{color:'var(--up)'}}>Banda superior</b> — el precio más alto de las últimas N velas. Techo del rango.</span></div>
           <div className="bandrow"><span className="dotc" style={{background:'var(--mid)'}}></span><span><b style={{color:'var(--mid)'}}>Línea media</b> — el punto medio. Suele actuar como resistencia o soporte dinámico.</span></div>
           <div className="bandrow"><span className="dotc" style={{background:'var(--down)'}}></span><span><b style={{color:'var(--down)'}}>Banda inferior</b> — el precio más bajo de las últimas N velas. Piso del rango.</span></div>
         </div>
         <div className="steps">
           <div className="step"><span className="num">1</span><div className="t">Pegá los datos</div>Pegá el CSV del fetcher con columna Ticker, fecha, máximo, mínimo y cierre. Podés tener varios papeles juntos.</div>
           <div className="step"><span className="num">2</span><div className="t">Elegí el papel y el período</div>Tocá un ticker en "Mi portfolio" para ver su detalle. N=20 es el estándar; más alto = más lento.</div>
           <div className="step"><span className="num">3</span><div className="t">Leé el panel</div>A la derecha ves dónde está el precio dentro del canal y a qué distancia de cada banda.</div>
         </div>
         <p><b>Cómo leerlo rápido:</b> si el precio toca o supera la banda superior, viene fuerte (posible ruptura alcista); si toca la inferior, viene débil. La barra de colores del panel derecho te muestra de un vistazo en qué parte del canal está parado.</p>
         <p style={{margin:0,color:'var(--dim)',fontSize:'11px'}}>El Donchian necesita máximos y mínimos de cada vela, no solo el cierre. Análisis técnico, no es una recomendación de compra o venta.</p>
       </div>
     </details>

     <details className="intro">
       <summary>Cómo leer la señal · qué hacer según dónde está el precio <span className="chev">▾</span></summary>
       <div className="body">
         <p style={{marginBottom:'12px'}}>Esto es una guía de lectura, no una regla automática. El Donchian te da la <b>geometría del precio</b> (en qué parte de su rango está el papel); el RRG te da la <b>rotación</b> (en qué cuadrante está el sector o el papel vs. el SPY). La idea es cruzar los dos: cuando coinciden, tenés convicción; cuando se contradicen, dudás.</p>
         <p style={{marginBottom:'14px',background:'var(--panel2)',borderRadius:'8px',padding:'11px 13px'}}>🧭 <b>Regla rápida de cruce con el RRG:</b> señal fuerte del Donchian (mitad superior o ruptura arriba) + cuadrante <b style={{color:'var(--up)'}}>LIDERANDO</b> o <b style={{color:'var(--mid)'}}>MEJORANDO</b> = convergencia, confirmada. Señal fuerte del Donchian pero cuadrante <b style={{color:'var(--down)'}}>REZAGADO</b> o <b>DEBILITANDO</b> = divergencia: puede ser un rebote sin respaldo de rotación (ojo, tu patrón de trampa).</p>
         <div className="pb">
           <div className="pbrow">
             <div className="zone"><span className="bar" style={{background:'var(--up)'}}></span>Ruptura alcista</div>
             <div className="desc">El precio toca o supera la <b>banda superior</b>: hizo un nuevo máximo de N semanas, viene fuerte.<span className="act">→ Cruzá con el RRG: si el sector o el papel está en LIDERANDO o MEJORANDO, es confirmación. Si está en REZAGADO, puede ser rebote sin respaldo. Ojo con la extensión igual: si ya está parabólico, la fuerza no es excusa para entrar tarde.</span></div>
           </div>
           <div className="pbrow">
             <div className="zone"><span className="bar" style={{background:'linear-gradient(var(--up),var(--mid))'}}></span>Mitad superior</div>
             <div className="desc">Entre la <b>línea media y el techo</b>: bien parado, tendencia sana.<span className="act">→ Sostener mientras el RRG lo acompañe (LIDERANDO o MEJORANDO). Si el cuadrante empieza a girar hacia DEBILITANDO, ahí prendé la alarma.</span></div>
           </div>
           <div className="pbrow">
             <div className="zone"><span className="bar" style={{background:'var(--mid)'}}></span>Sobre la media</div>
             <div className="desc">Pegado a la <b>línea media</b>: zona bisagra, puede definir para cualquier lado.<span className="act">→ Vigilar 2-3 ruedas. Mirá hacia dónde apunta la flecha del papel en el RRG: te anticipa para qué lado puede romper.</span></div>
           </div>
           <div className="pbrow">
             <div className="zone"><span className="bar" style={{background:'linear-gradient(var(--mid),var(--down))'}}></span>Mitad inferior</div>
             <div className="desc">Entre el <b>piso y la media</b>: perdió la media, se está debilitando.<span className="act">→ Revisar. Si además el RRG está en DEBILITANDO o REZAGADO, es salida clara. Si el RRG sigue en LIDERANDO, puede ser sólo una corrección dentro de tendencia fuerte: no te apures a soltar.</span></div>
           </div>
           <div className="pbrow">
             <div className="zone"><span className="bar" style={{background:'var(--down)'}}></span>Ruptura bajista</div>
             <div className="desc">El precio toca o perfora la <b>banda inferior</b>: nuevo mínimo de N semanas, débil.<span className="act">→ Señal de salida / stop, sobre todo si el RRG confirma (DEBILITANDO o REZAGADO). No comprar la caída: un piso roto suele buscar pisos más bajos.</span></div>
           </div>
         </div>
         <p style={{marginTop:'14px',marginBottom:0,color:'var(--dim)',fontSize:'11px'}}>Las bandas y la media se recalculan cada semana: los niveles se mueven solos a medida que entran velas nuevas. No los tomes como líneas fijas. Análisis técnico, no es recomendación.</p>
       </div>
     </details>

     {!err && analyzed.length>0 && <div className="card pf">
       <h2>Mi portfolio — {analyzed.length} {analyzed.length===1?'papel':'papeles'} · elegí para ver el detalle</h2>
       <div className="pfgrid">
         {analyzed.map(s=>{
           const a=s.a;
           const p=a.has?Math.max(0,Math.min(100,a.pos)):50;
           return <button key={s.name} className={"pfchip"+(s.name===current?" on":"")} onClick={()=>{setSel(s.name);setShowSum(false);}}>
             <div className="nm">{s.name}</div>
             <div className={"est "+(a.has?a.estado.cls:'neu')}>{a.has?a.estado.txt:'sin datos'}</div>
             {a.has && <div className="mini"><i style={{left:p+'%'}}></i></div>}
           </button>;
         })}
       </div>
     </div>}

     <div className="grid">
       <div>
         <div className="card">
           <h2>Pegar datos OHLC</h2>
           <textarea value={raw} onChange={e=>{setRaw(e.target.value);setShowSum(false);}} spellCheck="false"
             placeholder="Ticker,Date,High,Low,Close  (o pegá tu CSV semanal)"/>
           {err && <div className="err">⚠ {err}</div>}
           {isSample && !err && <div className="demo">◆ Estás viendo datos de ejemplo (DEMO1 y DEMO2). Pegá tu CSV real del fetcher con columna Ticker.</div>}
           <div className="controls">
             <div className="field">
               <label>Período (N)</label>
               <input type="number" min="2" max="200" value={period} onChange={e=>setPeriod(parseInt(e.target.value)||20)}/>
             </div>
             <label className="toggle"><input type="checkbox" checked={excludeCurrent} onChange={e=>setExcludeCurrent(e.target.checked)}/>Excluir vela actual</label>
             <button className="btn" onClick={()=>{setRaw(SAMPLE);setShowSum(false);}}>Restaurar ejemplo</button>
           </div>
           {!err && analyzed.length>0 && <div className="detect">Formato de números detectado: <b>decimal con {decimalMode}</b> · ajuste automático</div>}
         </div>

         <div className="card chartcard">
           <h2>Gráfico {current?'· '+current:''}</h2>
           <Chart data={data}/>
         </div>
       </div>

       <div>
         <div className="card">
           <h2>Lectura del último cierre {current?'· '+current:''}</h2>
           {has ? <>
             <div style={{marginBottom:'10px'}}><span className={"pill "+estado.cls}>{estado.txt}</span></div>
             <div className="readrow"><span className="k">Cierre actual</span><span className="v price">{fmt(last.close)}</span></div>
             <div className="readrow"><span className="k">Banda superior (máx {period})</span><span className="v up">{fmt(last.upper)}</span></div>
             <div className="readrow"><span className="k">Línea media</span><span className="v mid">{fmt(last.mid)}</span></div>
             <div className="readrow"><span className="k">Banda inferior (mín {period})</span><span className="v down">{fmt(last.lower)}</span></div>
             <div className="readrow"><span className="k">Ancho del canal</span><span className="v">{fmt(range)}</span></div>
             <div style={{marginTop:'16px'}}>
               <div className="poslbl"><span>Inferior</span><span>Media</span><span>Superior</span></div>
               <div className="posbar"><div className="dot" style={{left:Math.max(0,Math.min(100,pos))+'%'}}></div></div>
               <div style={{textAlign:'center',color:'var(--muted)',fontSize:'11px'}}>Precio al {fmt(pos,0)}% del canal</div>
             </div>
             <div className="readrow" style={{marginTop:'10px'}}><span className="k">Distancia a la media</span><span className="v mid">{distMidPct>=0?'+':''}{fmt(distMidPct)}%</span></div>
             <div className="readrow"><span className="k">Distancia a banda sup</span><span className="v up">{distUpPct>=0?'+':''}{fmt(distUpPct)}%</span></div>
           </> : <div style={{color:'var(--muted)'}}>Sin lectura: faltan velas para el período elegido.</div>}
         </div>

         <div className="card" style={{marginTop:'18px'}}>
           <h2>Resumen para WhatsApp</h2>
           <button className="btn solid" onClick={()=>{setShowSum(true);navigator.clipboard&&navigator.clipboard.writeText(summary);}}>Copiar resumen</button>
           <div className={"summary"+(showSum?" show":"")}>{summary}</div>
         </div>
       </div>
     </div>

     <div className="note">
       <b>Cómo se alimenta:</b> el Donchian se calcula con los <b>máximos y mínimos</b> de cada vela (no con el cierre). El fetcher de Apps Script trae high/low de Yahoo y arma un CSV con columna Ticker, así que podés tener todo tu portfolio en una sola pegada. Para sumar un papel nuevo, lo agregás a la lista del script y volvés a correrlo. Análisis técnico, no es recomendación de compra o venta.
     </div>
   </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
